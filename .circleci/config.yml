version: 2.1

parameters:
  webkit_ref:
    type: string
    default: ""

orbs:
  win: circleci/windows@5.1.1

commands:
  attach-metadata:
    steps:
      - attach_workspace:
          at: .
  persist-release:
    steps:
      - store_artifacts:
          path: release
      - persist_to_workspace:
          root: .
          paths:
            - release

jobs:
  resolve-webkit:
    docker:
      - image: cimg/node:24.11
    environment:
      WEBKIT_REF: << pipeline.parameters.webkit_ref >>
    steps:
      - checkout
      - run:
          name: Resolve upstream WebKit release
          command: node scripts/resolve-webkit-ref.js
      - persist_to_workspace:
          root: .
          paths:
            - build-metadata

  build-macos-arm64:
    macos:
      xcode: 26.4.0
    resource_class: m4pro.medium
    steps:
      - checkout
      - attach-metadata
      - run:
          name: Install dependencies
          command: |
            brew install node@24 ninja
            echo 'export PATH="/opt/homebrew/opt/node@24/bin:$PATH"' >> "$BASH_ENV"
      - run:
          name: Build and package JSC
          environment:
            TARGET_OS: macos
            PLATFORM_KEY: macos-arm64
            ARTIFACT_NAME: cottontail-jsc-macos-arm64
            CC: clang
            CXX: clang++
          command: bash scripts/build-unix-jsc.sh
      - persist-release

  build-linux-x64:
    machine:
      image: ubuntu-2404:2026.05.1
    resource_class: large
    steps:
      - checkout
      - attach-metadata
      - run:
          name: Install dependencies
          command: |
            curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
            sudo apt-get install -y build-essential clang-18 lld-18 ninja-build nodejs python3 ruby
      - run:
          name: Build and package JSC
          environment:
            TARGET_OS: linux
            PLATFORM_KEY: linux-x64
            ARTIFACT_NAME: cottontail-jsc-linux-amd64
            CC: clang-18
            CXX: clang++-18
          command: bash scripts/build-unix-jsc.sh
      - persist-release

  build-linux-arm64:
    machine:
      image: ubuntu-2404:2026.05.1
    resource_class: arm.large
    steps:
      - checkout
      - attach-metadata
      - run:
          name: Install dependencies
          command: |
            curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
            sudo apt-get install -y build-essential clang-18 lld-18 ninja-build nodejs python3 ruby
      - run:
          name: Build and package JSC
          environment:
            TARGET_OS: linux
            PLATFORM_KEY: linux-arm64
            ARTIFACT_NAME: cottontail-jsc-linux-arm64
            CC: clang-18
            CXX: clang++-18
          command: bash scripts/build-unix-jsc.sh
      - persist-release

  build-windows-x64:
    executor:
      name: win/server-2025
      version: "2026.05.1"
    environment:
      LLVM_VERSION: 21.1.8
      WINDOWS_JSCONLY_PATCH_COMMIT: 2d96c99b553946b611978b26dd1f83a8b68be10a
      WINDOWS_JSCONLY_PATCH_SHA256: c5a909008db01b72d7af7a2204dc6223fa24f9588aa7841370a21f4381cec767
      WINDOWS_MSVC_ATTRIBUTE_PATCH_COMMIT: 87d57a3fc39c408dd484cd3341a9448f3be2208d
      WINDOWS_MSVC_ATTRIBUTE_PATCH_SHA256: baf88f17960706e82d1919bbbe109a58f74f1dcb6a263971774a8e693aca1ee1
    steps:
      - checkout
      - attach-metadata
      - run:
          name: Install dependencies
          shell: powershell.exe
          command: |
            nvm install 24.11.1 64
            nvm use 24.11.1 64
            choco install strawberryperl ninja msys2 -y --no-progress
            $installer = Join-Path $env:TEMP "LLVM-$env:LLVM_VERSION-win64.exe"
            Invoke-WebRequest -Uri "https://github.com/llvm/llvm-project/releases/download/llvmorg-$env:LLVM_VERSION/LLVM-$env:LLVM_VERSION-win64.exe" -OutFile $installer
            $process = Start-Process -FilePath $installer -ArgumentList '/S', '/D=C:\LLVM' -Wait -PassThru
            if ($process.ExitCode -ne 0) { throw 'LLVM installation failed' }
      - run:
          name: Build and package JSC
          shell: powershell.exe
          command: .\scripts\build-windows-jsc.ps1
      - persist-release

  publish-r2:
    docker:
      - image: cimg/node:24.11
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Publish complete JSC matrix to R2
          command: node scripts/upload-release-r2.js

workflows:
  build-release-matrix:
    jobs:
      - resolve-webkit
      - build-macos-arm64:
          requires: [resolve-webkit]
      - build-linux-x64:
          requires: [resolve-webkit]
      - build-linux-arm64:
          requires: [resolve-webkit]
      - build-windows-x64:
          requires: [resolve-webkit]
      - publish-r2:
          requires:
            - build-macos-arm64
            - build-linux-x64
            - build-linux-arm64
            - build-windows-x64
