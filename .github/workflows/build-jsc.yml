name: Build JavaScriptCore (Cottontail)

on:
  workflow_dispatch:
    inputs:
      webkit_ref:
        description: Optional exact WebKit-* tag; blank selects the latest
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  LLVM_VERSION: 21.1.8
  ICU_ABI_FLOOR: "70"
  ICU_SOURCE_SHA256: 8d205428c17bf13bb535300669ed28b338a157b1c01ae66d31d0d3e2d47c3fd5
  WINDOWS_JSCONLY_PATCH_COMMIT: 2d96c99b553946b611978b26dd1f83a8b68be10a
  WINDOWS_JSCONLY_PATCH_SHA256: c5a909008db01b72d7af7a2204dc6223fa24f9588aa7841370a21f4381cec767
  WINDOWS_MSVC_ATTRIBUTE_PATCH_COMMIT: 87d57a3fc39c408dd484cd3341a9448f3be2208d
  WINDOWS_MSVC_ATTRIBUTE_PATCH_SHA256: baf88f17960706e82d1919bbbe109a58f74f1dcb6a263971774a8e693aca1ee1

jobs:
  resolve:
    name: Resolve upstream WebKit tag
    runs-on: ubuntu-24.04
    outputs:
      webkit_ref: ${{ steps.resolve.outputs.webkit_ref }}
      webkit_sha: ${{ steps.resolve.outputs.webkit_sha }}

    steps:
      - name: Validate and resolve tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          WEBKIT_REF: ${{ inputs.webkit_ref }}
        run: |
          if [[ -z "$WEBKIT_REF" ]]; then
            cursor=null
            while [[ -z "$WEBKIT_REF" ]]; do
              response=$(
                gh api graphql \
                -f query='query($cursor: String) {
                  repository(owner: "WebKit", name: "WebKit") {
                    refs(
                      refPrefix: "refs/tags/"
                      first: 100
                      after: $cursor
                      orderBy: { field: TAG_COMMIT_DATE, direction: DESC }
                    ) {
                      nodes { name }
                      pageInfo { hasNextPage endCursor }
                    }
                  }
                }' \
                  -F cursor="$cursor"
              )

              WEBKIT_REF=$(
                jq -r '
                  .data.repository.refs.nodes
                  | map(select(.name | startswith("WebKit-")))
                  | .[0].name // empty
                ' <<< "$response"
              )

              if [[ -n "$WEBKIT_REF" ]]; then
                break
              fi

              has_next=$(jq -r '.data.repository.refs.pageInfo.hasNextPage' <<< "$response")
              if [[ "$has_next" != "true" ]]; then
                break
              fi
              cursor=$(jq -r '.data.repository.refs.pageInfo.endCursor' <<< "$response")
            done
          fi

          if [[ -z "$WEBKIT_REF" ]]; then
            echo "Could not find an upstream numeric WebKit-* tag" >&2
            exit 1
          fi

          if [[ ! "$WEBKIT_REF" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid WebKit tag: $WEBKIT_REF" >&2
            exit 1
          fi

          webkit_sha=$(
            git ls-remote --exit-code --tags https://github.com/WebKit/WebKit.git \
              "refs/tags/$WEBKIT_REF^{}" |
              awk 'NR == 1 { print $1 }'
          ) || true

          if [[ -z "$webkit_sha" ]]; then
            webkit_sha=$(
              git ls-remote --exit-code --tags https://github.com/WebKit/WebKit.git \
                "refs/tags/$WEBKIT_REF" |
                awk 'NR == 1 { print $1 }'
            ) || {
              echo "Upstream WebKit tag does not exist: $WEBKIT_REF" >&2
              exit 1
            }
          fi

          echo "webkit_ref=$WEBKIT_REF" >> "$GITHUB_OUTPUT"
          echo "webkit_sha=$webkit_sha" >> "$GITHUB_OUTPUT"
          echo "Building WebKit/WebKit $WEBKIT_REF at $webkit_sha"

  unix:
    name: ${{ matrix.name }}
    needs: resolve
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-15
            os: macos
            arch: arm64
            cc: clang
            cxx: clang++
            artifact: cottontail-jsc-macos-arm64
          - name: Linux x64
            runner: ubuntu-24.04
            os: linux
            arch: x64
            cc: clang-18
            cxx: clang++-18
            artifact: cottontail-jsc-linux-amd64
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            cc: clang-18
            cxx: clang++-18
            artifact: cottontail-jsc-linux-arm64

    env:
      WEBKIT_OUTPUTDIR: ${{ github.workspace }}/WebKitBuild
      ARTIFACT_NAME: ${{ matrix.artifact }}
      ICU_PREFIX: ${{ github.workspace }}/icu-system

    defaults:
      run:
        working-directory: WebKit

    steps:
      - name: Check out build scripts
        uses: actions/checkout@v4
        with:
          path: BuildScripts

      - name: Check out upstream WebKit tag without test suites
        uses: actions/checkout@v4
        with:
          repository: WebKit/WebKit
          ref: ${{ needs.resolve.outputs.webkit_ref }}
          path: WebKit
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !JSTests/
            !LayoutTests/
            !ManualTests/
            !WebDriverTests/

      - name: Install macOS build dependencies
        if: matrix.os == 'macos'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: brew install ninja

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-18 \
            lld-18 \
            ninja-build \
            python3 \
            ruby

      - name: Prepare ICU 70 headers and system bridge
        working-directory: BuildScripts
        env:
          CC: ${{ matrix.cc }}
        run: bash scripts/prepare-system-icu.sh "$ICU_PREFIX" "${{ matrix.os }}"

      - name: Build JSCOnly
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          CFLAGS: -DU_DISABLE_RENAMING=1
          CXXFLAGS: -DU_DISABLE_RENAMING=1
        run: |
          if [[ "${{ matrix.os }}" == linux ]]; then
            icu_data="$ICU_PREFIX/lib/libicudata.a"
            icu_i18n="$ICU_PREFIX/lib/libicui18n.a"
            icu_uc="$ICU_PREFIX/lib/libicuuc.a"
          else
            icu_system_library="$(xcrun --show-sdk-path)/usr/lib/libicucore.tbd"
            test -s "$icu_system_library"
            icu_data="$icu_system_library"
            icu_i18n="$icu_system_library"
            icu_uc="$icu_system_library"
            platform_cmake_args="-DCMAKE_OSX_DEPLOYMENT_TARGET=14.0"
          fi

          Tools/Scripts/build-jsc \
            --jsc-only \
            --release \
            --cmakeargs="-DENABLE_STATIC_JSC=ON -DENABLE_API_TESTS=OFF -DENABLE_JIT=ON -DENABLE_DFG_JIT=ON -DENABLE_FTL_JIT=ON -DENABLE_WEBASSEMBLY=ON -DENABLE_WEBASSEMBLY_BBQJIT=ON -DENABLE_WEBASSEMBLY_OMGJIT=ON -DENABLE_SAMPLING_PROFILER=OFF -DENABLE_REMOTE_INSPECTOR=OFF ${platform_cmake_args:-} -DICU_INCLUDE_DIR=$ICU_PREFIX/include -DICU_DATA_LIBRARY_RELEASE=$icu_data -DICU_I18N_LIBRARY_RELEASE=$icu_i18n -DICU_UC_LIBRARY_RELEASE=$icu_uc"

      - name: Smoke test jsc
        run: |
          jsc_binary=$(find "$WEBKIT_OUTPUTDIR" -type f -path '*/bin/jsc' -perm -111 -print -quit)
          if [[ -z "$jsc_binary" ]]; then
            echo "Could not find the built jsc executable under $WEBKIT_OUTPUTDIR" >&2
            find "$WEBKIT_OUTPUTDIR" -maxdepth 4 -type f -print
            exit 1
          fi

          jsc_build_dir=$(cd "$(dirname "$jsc_binary")/.." && pwd)

          for feature in \
            ENABLE_JIT \
            ENABLE_DFG_JIT \
            ENABLE_FTL_JIT \
            ENABLE_WEBASSEMBLY \
            ENABLE_WEBASSEMBLY_BBQJIT \
            ENABLE_WEBASSEMBLY_OMGJIT; do
            grep -Eq "^#define ${feature} 1$" "$jsc_build_dir/cmakeconfig.h" || {
              echo "Expected full-build feature is disabled: $feature" >&2
              exit 1
            }
          done

          for feature in ENABLE_SAMPLING_PROFILER ENABLE_REMOTE_INSPECTOR; do
            grep -Eq "^#define ${feature} 0$" "$jsc_build_dir/cmakeconfig.h" || {
              echo "Expected production-only feature is enabled: $feature" >&2
              exit 1
            }
          done

          "$jsc_binary" -e 'const number = new Intl.NumberFormat("fr-FR", { useGrouping: false, minimumFractionDigits: 1 }); if (number.format(1.5) !== "1,5") throw new Error("system ICU number formatting failed"); if ("Stra\u00dfe".toLocaleUpperCase("de-DE") !== "STRASSE") throw new Error("system ICU case mapping failed"); if ("e\u0301".normalize("NFC") !== "\u00e9") throw new Error("Unicode normalization failed"); const wasm = new Uint8Array([0,97,115,109,1,0,0,0,1,5,1,96,0,1,127,3,2,1,0,7,7,1,3,97,110,115,0,0,10,6,1,4,0,65,42,11]); if (new WebAssembly.Instance(new WebAssembly.Module(wasm)).exports.ans() !== 42) throw new Error("WebAssembly smoke test failed")'

          if [[ "${{ matrix.os }}" == linux ]]; then
            if ldd "$jsc_binary" | grep -q 'libicu'; then
              echo "jsc has a direct versioned ICU dependency; the bridge was bypassed" >&2
              ldd "$jsc_binary"
              exit 1
            fi
            if nm -u "$jsc_build_dir/lib/libJavaScriptCore.a" | grep -E ' U u[a-zA-Z0-9_]+_[0-9]+$'; then
              echo "JavaScriptCore contains version-renamed ICU references" >&2
              exit 1
            fi
          fi

          echo "JSC_BINARY=$jsc_binary" >> "$GITHUB_ENV"
          echo "JSC_BUILD_DIR=$jsc_build_dir" >> "$GITHUB_ENV"

      - name: Package build products
        run: |
          package_dir="$RUNNER_TEMP/$ARTIFACT_NAME"
          mkdir -p \
            "$package_dir/bin" \
            "$package_dir/lib" \
            "$package_dir/include/JavaScriptCore" \
            "$package_dir/include/wtf" \
            "$package_dir/include/bmalloc"

          cp "$JSC_BINARY" "$package_dir/bin/"
          find "$JSC_BUILD_DIR/lib" -maxdepth 1 -type f \
            \( -name '*.a' -o -name '*.so' -o -name '*.so.*' -o -name '*.dylib' \) \
            -exec cp {} "$package_dir/lib/" \;

          if [[ "${{ matrix.os }}" == linux ]]; then
            cp "$ICU_PREFIX/lib/libcottontail_icu.a" "$package_dir/lib/"
          fi
          cp "$ICU_PREFIX/SYSTEM_ICU_USAGE" "$package_dir/"

          cp "$JSC_BUILD_DIR/cmakeconfig.h" "$package_dir/include/"
          cp -R "$JSC_BUILD_DIR/JavaScriptCore/Headers/JavaScriptCore/." \
            "$package_dir/include/JavaScriptCore/"
          cp -R "$JSC_BUILD_DIR/WTF/Headers/wtf/." \
            "$package_dir/include/wtf/"

          if [[ -d "$JSC_BUILD_DIR/bmalloc/Headers/bmalloc" ]]; then
            cp -R "$JSC_BUILD_DIR/bmalloc/Headers/bmalloc/." \
              "$package_dir/include/bmalloc/"
          fi

          if [[ -d "$JSC_BUILD_DIR/JavaScriptCore/DerivedSources" ]]; then
            find "$JSC_BUILD_DIR/JavaScriptCore/DerivedSources" -type f -name '*.h' \
              -exec cp {} "$package_dir/include/JavaScriptCore/" \;
          fi

          git rev-parse HEAD > "$package_dir/WEBKIT_REVISION"
          tar -C "$RUNNER_TEMP" -czf "$RUNNER_TEMP/$ARTIFACT_NAME.tar.gz" "$ARTIFACT_NAME"

      - name: Report artifact size
        run: |
          {
            echo "### $ARTIFACT_NAME"
            echo '```'
            ls -lh "$RUNNER_TEMP/$ARTIFACT_NAME.tar.gz"
            echo
            echo "Libraries:"
            ls -lh "$RUNNER_TEMP/$ARTIFACT_NAME/lib/"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ runner.temp }}/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error
          compression-level: 0

  windows-x64:
    name: Windows x64
    needs: resolve
    runs-on: windows-2025
    timeout-minutes: 180

    env:
      WEBKIT_OUTPUTDIR: ${{ github.workspace }}\WebKitBuild
      ARTIFACT_NAME: cottontail-jsc-windows-amd64
      ICU_PREFIX: ${{ github.workspace }}\icu-system

    defaults:
      run:
        working-directory: WebKit

    steps:
      - name: Check out build scripts
        uses: actions/checkout@v4
        with:
          path: BuildScripts

      - name: Check out upstream WebKit tag without test suites
        uses: actions/checkout@v4
        with:
          repository: WebKit/WebKit
          ref: ${{ needs.resolve.outputs.webkit_ref }}
          path: WebKit
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !JSTests/
            !LayoutTests/
            !ManualTests/
            !WebDriverTests/

      - name: Backport upstream Windows JSCOnly fixes when needed
        shell: pwsh
        run: |
          $patchPath = Join-Path $env:RUNNER_TEMP 'webkit-windows-jsconly.patch'
          $patchUri = "https://github.com/WebKit/WebKit/commit/$env:WINDOWS_JSCONLY_PATCH_COMMIT.patch"
          Invoke-WebRequest -Uri $patchUri -OutFile $patchPath

          $actualHash = (Get-FileHash $patchPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:WINDOWS_JSCONLY_PATCH_SHA256) {
            throw "Windows JSCOnly patch checksum mismatch: $actualHash"
          }

          git apply --reverse --check $patchPath 2>$null
          if ($LASTEXITCODE -eq 0) {
            'The selected WebKit tag already contains the Windows JSCOnly fixes.'
            'WINDOWS_JSCONLY_PATCH_APPLIED=false' >> $env:GITHUB_ENV
            exit 0
          }

          git apply --check $patchPath
          if ($LASTEXITCODE -ne 0) {
            throw 'Upstream Windows JSCOnly patch does not apply to this WebKit tag'
          }
          git apply $patchPath
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to apply the upstream Windows JSCOnly patch'
          }
          'WINDOWS_JSCONLY_PATCH_APPLIED=true' >> $env:GITHUB_ENV

      - name: Backport clang-cl no_unique_address compatibility when needed
        shell: pwsh
        run: |
          $patchPath = Join-Path $env:RUNNER_TEMP 'webkit-msvc-no-unique-address.patch'
          $patchUri = "https://github.com/WebKit/WebKit/commit/$env:WINDOWS_MSVC_ATTRIBUTE_PATCH_COMMIT.patch"
          Invoke-WebRequest -Uri $patchUri -OutFile $patchPath

          $actualHash = (Get-FileHash $patchPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:WINDOWS_MSVC_ATTRIBUTE_PATCH_SHA256) {
            throw "MSVC attribute patch checksum mismatch: $actualHash"
          }

          $compilerHeader = 'Source/WTF/wtf/Compiler.h'
          git apply --reverse --check --include=$compilerHeader $patchPath 2>$null
          $compilerPatchNeeded = $LASTEXITCODE -ne 0
          if ($compilerPatchNeeded) {
            git apply --check --include=$compilerHeader $patchPath
            if ($LASTEXITCODE -ne 0) {
              throw 'Upstream MSVC attribute patch does not apply to this WebKit tag'
            }
            git apply --include=$compilerHeader $patchPath
            if ($LASTEXITCODE -ne 0) {
              throw 'Failed to apply the upstream MSVC attribute patch'
            }
          }

          $segmentedVector = 'Source/WTF/wtf/SegmentedVector.h'
          $contents = [IO.File]::ReadAllText($segmentedVector)
          $oldDeclaration = '[[no_unique_address]] std::conditional_t<hasInlineStorage, InlineStorageData, EmptyInlineStorage> m_inlineStorageMember;'
          $newDeclaration = 'NO_UNIQUE_ADDRESS std::conditional_t<hasInlineStorage, InlineStorageData, EmptyInlineStorage> m_inlineStorageMember;'
          $segmentedVectorPatchNeeded = $contents.Contains($oldDeclaration)
          if ($segmentedVectorPatchNeeded) {
            [IO.File]::WriteAllText($segmentedVector, $contents.Replace($oldDeclaration, $newDeclaration))
          } elseif (-not $contents.Contains($newDeclaration)) {
            throw 'Could not find the expected SegmentedVector no_unique_address declaration'
          }

          $patchApplied = $compilerPatchNeeded -or $segmentedVectorPatchNeeded
          "WINDOWS_MSVC_ATTRIBUTE_PATCH_APPLIED=$($patchApplied.ToString().ToLowerInvariant())" >> $env:GITHUB_ENV

      - name: Add Windows system ICU compatibility
        shell: pwsh
        run: |
          $patch = '../BuildScripts/patches/windows-system-icu.patch'
          git apply --check $patch
          if ($LASTEXITCODE -ne 0) {
            throw 'Windows system ICU compatibility patch does not apply to this WebKit tag'
          }
          git apply $patch
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to apply the Windows system ICU compatibility patch'
          }

          Copy-Item '../BuildScripts/bridge/windows-system-icu.h' 'Source/JavaScriptCore/runtime/CottontailWindowsSystemICU.h'

      - name: Install Windows build dependencies
        shell: pwsh
        run: |
          choco install strawberryperl ninja -y --no-progress

          $llvmInstaller = Join-Path $env:RUNNER_TEMP "LLVM-$env:LLVM_VERSION-win64.exe"
          $llvmUri = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$env:LLVM_VERSION/LLVM-$env:LLVM_VERSION-win64.exe"
          Invoke-WebRequest -Uri $llvmUri -OutFile $llvmInstaller
          $process = Start-Process -FilePath $llvmInstaller -ArgumentList '/S', '/D=C:\LLVM' -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "LLVM installer failed with exit code $($process.ExitCode)"
          }

      - name: Prepare ICU 70 headers
        shell: pwsh
        working-directory: BuildScripts
        run: |
          $archive = Join-Path $env:RUNNER_TEMP 'icu4c-70_1-src.tgz'
          $sourceDir = Join-Path $env:RUNNER_TEMP 'icu4c-70_1-src'
          $uri = 'https://github.com/unicode-org/icu/releases/download/release-70-1/icu4c-70_1-src.tgz'
          Invoke-WebRequest -Uri $uri -OutFile $archive

          $actualHash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:ICU_SOURCE_SHA256) {
            throw "ICU source checksum mismatch: $actualHash"
          }

          Remove-Item $env:ICU_PREFIX -Recurse -Force -ErrorAction Ignore
          Remove-Item $sourceDir -Recurse -Force -ErrorAction Ignore
          New-Item -ItemType Directory -Force -Path "$env:ICU_PREFIX\include\unicode", $sourceDir | Out-Null
          tar -xzf $archive -C $sourceDir --strip-components=1
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to extract ICU 70 headers'
          }

          Copy-Item "$sourceDir\source\common\unicode\*" "$env:ICU_PREFIX\include\unicode\" -Recurse -Force
          Copy-Item "$sourceDir\source\i18n\unicode\*" "$env:ICU_PREFIX\include\unicode\" -Recurse -Force
          @(
            'Cottontail JavaScriptCore uses the operating system ICU data.'
            'Windows applications must link the Windows SDK icu.lib.'
            'Windows 11 provides the combined system ICU C API in icu.dll.'
          ) | Set-Content "$env:ICU_PREFIX\SYSTEM_ICU_USAGE"

      - name: Build JSCOnly against Windows system ICU
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set "VSINSTALL=%%i"
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64
          set "PATH=C:\ProgramData\chocolatey\bin;C:\Strawberry\perl\bin;%PATH%"
          set "SYSTEM_ICU_LIB=%WindowsSdkDir%Lib\%WindowsSDKVersion%um\x64\icu.lib"
          echo Windows SDK ICU: "%SYSTEM_ICU_LIB%"
          if not exist "%SYSTEM_ICU_LIB%" exit /b 1
          cmake -S . -B "%WEBKIT_OUTPUTDIR%\Release" -G Ninja ^
            -DPORT=JSCOnly ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DDEVELOPER_MODE=ON ^
            -DENABLE_STATIC_JSC=ON ^
            -DENABLE_API_TESTS=OFF ^
            -DENABLE_JIT=ON ^
            -DENABLE_DFG_JIT=ON ^
            -DENABLE_FTL_JIT=ON ^
            -DENABLE_WEBASSEMBLY=ON ^
            -DENABLE_WEBASSEMBLY_BBQJIT=ON ^
            -DENABLE_WEBASSEMBLY_OMGJIT=ON ^
            -DENABLE_SAMPLING_PROFILER=OFF ^
            -DENABLE_REMOTE_INSPECTOR=OFF ^
            -DCMAKE_C_COMPILER=C:/LLVM/bin/clang-cl.exe ^
            -DCMAKE_CXX_COMPILER=C:/LLVM/bin/clang-cl.exe ^
            -DCMAKE_C_FLAGS=/DU_DISABLE_RENAMING=1 ^
            -DCMAKE_CXX_FLAGS=/DU_DISABLE_RENAMING=1 ^
            -DCMAKE_LINKER=C:/LLVM/bin/lld-link.exe ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded ^
            -DICU_INCLUDE_DIR="%ICU_PREFIX%/include" ^
            -DICU_DATA_LIBRARY_RELEASE="%SYSTEM_ICU_LIB%" ^
            -DICU_I18N_LIBRARY_RELEASE="%SYSTEM_ICU_LIB%" ^
            -DICU_UC_LIBRARY_RELEASE="%SYSTEM_ICU_LIB%"
          if errorlevel 1 exit /b %errorlevel%

          cmake --build "%WEBKIT_OUTPUTDIR%\Release" --target jsc --parallel

      - name: Smoke test and package build products
        shell: pwsh
        run: |
          $jsc = Get-ChildItem $env:WEBKIT_OUTPUTDIR -Recurse -File -Filter jsc.exe |
            Select-Object -First 1
          if (-not $jsc) {
            Get-ChildItem $env:WEBKIT_OUTPUTDIR -Recurse -File |
              Select-Object -ExpandProperty FullName
            throw "Could not find jsc.exe under $env:WEBKIT_OUTPUTDIR"
          }

          $buildDir = $jsc.Directory.Parent.FullName
          $config = Get-Content (Join-Path $buildDir 'cmakeconfig.h') -Raw
          @(
            'ENABLE_JIT'
            'ENABLE_DFG_JIT'
            'ENABLE_FTL_JIT'
            'ENABLE_WEBASSEMBLY'
            'ENABLE_WEBASSEMBLY_BBQJIT'
            'ENABLE_WEBASSEMBLY_OMGJIT'
          ) | ForEach-Object {
            if ($config -notmatch "(?m)^#define $_ 1\r?$") {
              throw "Expected full-build feature is disabled: $_"
            }
          }
          @('ENABLE_SAMPLING_PROFILER', 'ENABLE_REMOTE_INSPECTOR') | ForEach-Object {
            if ($config -notmatch "(?m)^#define $_ 0\r?$") {
              throw "Expected production-only feature is enabled: $_"
            }
          }

          & $jsc.FullName -e 'const number = new Intl.NumberFormat("fr-FR", { useGrouping: false, minimumFractionDigits: 1 }); if (number.format(1.5) !== "1,5") throw new Error("system ICU number formatting failed"); if (new Intl.PluralRules("sl").selectRange(1, 2) !== "two") throw new Error("system ICU plural-range compatibility failed"); const historic = new Intl.DateTimeFormat("en-US", { dateStyle: "medium", timeZone: "UTC" }).formatRange(new Date("1000-01-01T00:00:00.000Z"), new Date("1000-01-02T00:00:00.000Z")); if (!historic) throw new Error("system ICU date-range compatibility failed"); if ("Stra\u00dfe".toLocaleUpperCase("de-DE") !== "STRASSE") throw new Error("system ICU case mapping failed"); if ("e\u0301".normalize("NFC") !== "\u00e9") throw new Error("Unicode normalization failed"); const wasm = new Uint8Array([0,97,115,109,1,0,0,0,1,5,1,96,0,1,127,3,2,1,0,7,7,1,3,97,110,115,0,0,10,6,1,4,0,65,42,11]); if (new WebAssembly.Instance(new WebAssembly.Module(wasm)).exports.ans() !== 42) throw new Error("WebAssembly smoke test failed")'
          if ($LASTEXITCODE -ne 0) {
            throw "JSC smoke test failed with exit code $LASTEXITCODE"
          }

          $packageDir = Join-Path $env:RUNNER_TEMP $env:ARTIFACT_NAME
          $packageDirectories = @(
            "$packageDir\bin"
            "$packageDir\lib"
            "$packageDir\include\JavaScriptCore"
            "$packageDir\include\wtf"
            "$packageDir\include\bmalloc"
          )
          New-Item -ItemType Directory -Force -Path $packageDirectories | Out-Null

          Copy-Item $jsc.FullName "$packageDir\bin\"
          Get-ChildItem "$buildDir\lib" -File |
            Where-Object Extension -In '.lib', '.dll' |
            Copy-Item -Destination "$packageDir\lib\"

          Copy-Item "$buildDir\cmakeconfig.h" "$packageDir\include\"
          Copy-Item "$buildDir\JavaScriptCore\Headers\JavaScriptCore\*" "$packageDir\include\JavaScriptCore\" -Recurse
          Copy-Item "$buildDir\WTF\Headers\wtf\*" "$packageDir\include\wtf\" -Recurse

          if (Test-Path "$buildDir\bmalloc\Headers\bmalloc") {
            Copy-Item "$buildDir\bmalloc\Headers\bmalloc\*" "$packageDir\include\bmalloc\" -Recurse
          }
          if (Test-Path "$buildDir\JavaScriptCore\DerivedSources") {
            Get-ChildItem "$buildDir\JavaScriptCore\DerivedSources" -Recurse -File -Filter *.h |
              Copy-Item -Destination "$packageDir\include\JavaScriptCore\"
          }

          Copy-Item "$env:ICU_PREFIX\SYSTEM_ICU_USAGE" "$packageDir\"

          git rev-parse HEAD | Set-Content "$packageDir\WEBKIT_REVISION"
          $patches = @()
          if ($env:WINDOWS_JSCONLY_PATCH_APPLIED -eq 'true') {
            $patches += $env:WINDOWS_JSCONLY_PATCH_COMMIT
          }
          if ($env:WINDOWS_MSVC_ATTRIBUTE_PATCH_APPLIED -eq 'true') {
            $patches += "$env:WINDOWS_MSVC_ATTRIBUTE_PATCH_COMMIT (MSVC NO_UNIQUE_ADDRESS compatibility)"
          }
          $patches += 'Cottontail Windows system ICU compatibility'
          if ($patches.Count) {
            $patches | Set-Content "$packageDir\WEBKIT_PATCHES"
          }
          tar -C $env:RUNNER_TEMP -czf "$env:RUNNER_TEMP\$env:ARTIFACT_NAME.tar.gz" $env:ARTIFACT_NAME

      - name: Report artifact size
        shell: pwsh
        run: |
          $archive = Get-Item "$env:RUNNER_TEMP\$env:ARTIFACT_NAME.tar.gz"
          "### $env:ARTIFACT_NAME" >> $env:GITHUB_STEP_SUMMARY
          '```' >> $env:GITHUB_STEP_SUMMARY
          "Archive: $([math]::Round($archive.Length / 1MB, 1)) MB" >> $env:GITHUB_STEP_SUMMARY
          Get-ChildItem "$env:RUNNER_TEMP\$env:ARTIFACT_NAME\lib" |
            Format-Table Name, @{N='Size(MB)';E={[math]::Round($_.Length / 1MB, 1)}} |
            Out-String >> $env:GITHUB_STEP_SUMMARY
          '```' >> $env:GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cottontail-jsc-windows-amd64
          path: ${{ runner.temp }}\cottontail-jsc-windows-amd64.tar.gz
          if-no-files-found: error
          compression-level: 0

  release:
    name: Create GitHub Release
    needs: [resolve, unix, windows-x64]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Verify release artifacts
        run: |
          expected=(
            cottontail-jsc-macos-arm64.tar.gz
            cottontail-jsc-linux-amd64.tar.gz
            cottontail-jsc-linux-arm64.tar.gz
            cottontail-jsc-windows-amd64.tar.gz
          )

          for artifact in "${expected[@]}"; do
            test -s "release-artifacts/$artifact" || {
              echo "Missing release artifact: $artifact" >&2
              exit 1
            }
          done

          ls -lh release-artifacts/*.tar.gz

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: jsc-${{ needs.resolve.outputs.webkit_ref }}
          name: Cottontail JSC ${{ needs.resolve.outputs.webkit_ref }}
          prerelease: true
          fail_on_unmatched_files: true
          body: |
            JSCOnly static builds from an upstream WebKit release tag. These builds
            use each supported operating system's ICU libraries and data instead of
            bundling ICU. JSC is compiled against the ICU 70 C ABI with its complete
            Baseline, DFG, FTL, and WebAssembly JIT stack.

            Linux artifacts include `libcottontail_icu.a`, which adapts JSC's
            unversioned ICU calls to the installed ICU 70-or-newer symbol version.
            Link it together with `libdl` when embedding JavaScriptCore.

            Upstream tag: ${{ needs.resolve.outputs.webkit_ref }}
            Upstream commit: ${{ needs.resolve.outputs.webkit_sha }}

            The Windows x64 build also runs on Windows 11 ARM through the operating system's x64 emulation.
          files: release-artifacts/*.tar.gz
